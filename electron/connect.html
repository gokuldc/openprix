<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>// OPENPRIX_CLIENT</title>
    <style>
        body {
            background-color: #060e1a;
            color: #e2e8f0;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: rgba(13, 31, 60, 0.7);
            padding: 40px;
            border-radius: 8px;
            border: 1px solid #1e3a5f;
            width: 400px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            color: #ffffff;
        }

        p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 24px;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            margin-bottom: 20px;
            background: #0c1929;
            border: 1px solid #3b82f6;
            color: #fff;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            text-align: center;
        }

        input:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.4);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            letter-spacing: 1px;
        }

        button:hover {
            background: #60a5fa;
        }

        .error {
            color: #ef4444;
            font-size: 13px;
            margin-top: 16px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>// OPENPRIX_CLIENT</h1>
        <p>Enter the IPv4 Address or Hostname of the Server Daemon.</p>
        <input type="text" id="serverUrl" placeholder="http://127.0.0.1:3000" />
        <button id="connectBtn">INITIALIZE CONNECTION</button>
        <div id="errorMsg" class="error">Connection failed. Verify the server is running.</div>
    </div>

    <script>
        // Remember the last used server so the user doesn't have to type it every time
        const savedUrl = localStorage.getItem('openprix_last_server') || 'http://127.0.0.1:3000';
        document.getElementById('serverUrl').value = savedUrl;

        document.getElementById('connectBtn').addEventListener('click', async () => {
            let url = document.getElementById('serverUrl').value.trim();
            if (url.endsWith('/')) url = url.slice(0, -1); // Strip trailing slashes

            const btn = document.getElementById('connectBtn');
            const err = document.getElementById('errorMsg');

            btn.innerText = "CONNECTING...";
            err.style.display = "none";

            // Ping the Rust Daemon's health route to ensure it's alive!
            try {
                const response = await fetch(`${url}/api/health`);
                if (response.ok) {
                    localStorage.setItem('openprix_last_server', url);
                    // 🔥 Uses the updated secure electronHost bridge to prevent context conflict
                    window.electronHost.system.connectToServer(url);
                } else {
                    throw new Error("Server rejected connection");
                }
            } catch (e) {
                btn.innerText = "INITIALIZE CONNECTION";
                err.style.display = "block";
            }
        });
    </script>
</body>

</html>
